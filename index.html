<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login CBT PKL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body class="bg-slate-50 flex items-center justify-center min-h-screen p-4">
    <div
      class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-slate-100"
    >
      <div class="text-center mb-8">
        <h2
          class="text-2xl font-bold text-slate-800 tracking-tight text-center"
        >
          Portal CBT Asterix
        </h2>
        <p id="status-jadwal" class="text-slate-500 text-sm mt-1">
          Memuat jadwal ujian...
        </p>
      </div>

      <div class="space-y-5">
        <div>
          <label
            class="block text-xs font-bold text-slate-400 mb-2 uppercase ml-1"
            >Asal Sekolah</label
          >
          <select
            id="sekolah"
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 appearance-none"
          >
            <option value="">-- Pilih Asal Sekolah --</option>
          </select>
        </div>

        <div>
          <label
            class="block text-xs font-bold text-slate-400 mb-2 uppercase ml-1"
            >Nama Lengkap</label
          >
          <select
            id="nama"
            class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 appearance-none"
          >
            <option value="">-- Pilih Sekolah Terlebih Dahulu --</option>
          </select>
        </div>

        <button
          id="btn-mulai"
          class="w-full bg-slate-400 text-white font-bold py-4 rounded-xl transition-all cursor-not-allowed shadow-lg"
          disabled
        >
          Mohon Tunggu...
        </button>
        <button
          onclick="showPanduan()"
          class="w-full mt-4 py-3 text-slate-500 font-semibold text-sm hover:text-blue-600 transition-colors flex items-center justify-center gap-2"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-5 w-5"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
            />
          </svg>
          Panduan & Aturan Ujian
        </button>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        getDocs,
        doc,
        getDoc,
        query,
        where,
        orderBy,
      } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyDa-LaeUGH1LN2YhwkNrlagJtxywIKln-E",
        authDomain: "pkl-cbt.firebaseapp.com",
        projectId: "pkl-cbt",
        storageBucket: "pkl-cbt.firebasestorage.app",
        messagingSenderId: "1012566290145",
        appId: "1:1012566290145:web:a6c60d5a6f9109e6fcd1a0",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const selSekolah = document.getElementById("sekolah");
      const selNama = document.getElementById("nama");
      const btnMulai = document.getElementById("btn-mulai");
      const statusLabel = document.getElementById("status-jadwal");

      // Variabel Global untuk menyimpan keadaan tombol asli dari server
      let defaultBtnText = "Mulai Ujian Sekarang";
      let defaultBtnClass =
        "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95";
      let isAksesDitutup = false;

      // CEK APAKAH SISWA SEDANG DALAM SESI UJIAN
      document.addEventListener("DOMContentLoaded", () => {
        const sedangUjian = localStorage.getItem("user_nama");
        // Jika ada nama tersimpan, artinya dia seharusnya di halaman ujian
        if (sedangUjian) {
          window.location.href = "ujian.html";
        }
      });

      async function initLogin() {
        try {
          // 1. Load Daftar Sekolah
          const snapSekolah = await getDocs(collection(db, "daftar_sekolah"));
          snapSekolah.forEach((d) => {
            let o = document.createElement("option");
            o.value = d.data().nama;
            o.innerText = d.data().nama;
            selSekolah.appendChild(o);
          });

          // 2. Load Config Ujian
          const snapSet = await getDoc(doc(db, "pengaturan", "config_utama"));
          if (snapSet.exists()) {
            const data = snapSet.data();
            const mulai = new Date(data.waktu_mulai).getTime();
            const sekarang = new Date().getTime();

            if (data.is_active === false) {
              isAksesDitutup = true;
              defaultBtnText = "UJIAN DITUTUP";
              defaultBtnClass =
                "w-full bg-red-600 text-white font-bold py-4 rounded-xl cursor-not-allowed opacity-80 shadow-lg";
              statusLabel.innerText = "Akses ujian ditutup oleh admin.";
              statusLabel.className = "text-red-500 text-sm mt-1 font-bold";
            } else if (sekarang < mulai) {
              const tglTampil = data.waktu_mulai.replace("T", " ");
              defaultBtnText = "Ujian Belum Dimulai";
              defaultBtnClass =
                "w-full bg-slate-400 text-white font-bold py-4 rounded-xl cursor-not-allowed";
              statusLabel.innerText = "Dibuka pada: " + tglTampil;
            } else {
              defaultBtnText = "Mulai Ujian Sekarang";
              defaultBtnClass =
                "w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95";
              statusLabel.innerText = "Sistem ujian aktif.";
              statusLabel.className = "text-green-600 text-sm mt-1 font-bold";
              btnMulai.disabled = false;
            }

            // Terapkan keadaan awal
            btnMulai.innerText = defaultBtnText;
            btnMulai.className = defaultBtnClass;
            localStorage.setItem("exam_duration", data.durasi_menit);
          }
        } catch (error) {
          console.error(error);
          statusLabel.innerText = "Gagal memuat konfigurasi server.";
        }
      }

      // EVENT: Saat Sekolah Dipilih
      selSekolah.onchange = async () => {
        const sekolah = selSekolah.value;
        selNama.innerHTML = '<option value="">Memuat daftar siswa...</option>';

        // Reset tombol ke default setiap ganti sekolah
        btnMulai.innerText = defaultBtnText;
        btnMulai.className = defaultBtnClass;

        if (!sekolah) {
          selNama.innerHTML =
            '<option value="">-- Pilih Sekolah Terlebih Dahulu --</option>';
          return;
        }
        try {
          const q = query(
            collection(db, "daftar_siswa"),
            where("sekolah", "==", sekolah),
            orderBy("nama", "asc"),
          );
          const snapSiswa = await getDocs(q);
          selNama.innerHTML = '<option value="">-- Pilih Nama Anda --</option>';
          snapSiswa.forEach((d) => {
            let o = document.createElement("option");
            o.value = d.data().nama;
            o.innerText = d.data().nama;
            selNama.appendChild(o);
          });
        } catch (e) {
          console.error(e);
          selNama.innerHTML = '<option value="">Gagal memuat siswa</option>';
        }
      };

      // EVENT: Saat Nama Dipilih (SCAN STATUS SELEKSI)
      selNama.onchange = async () => {
        const n = selNama.value;
        const s = selSekolah.value;

        if (!n || !s) {
          btnMulai.innerText = defaultBtnText;
          btnMulai.className = defaultBtnClass;
          return;
        }

        // Jika akses ditutup admin, jangan biarkan tombol berubah warna jadi biru/hijau
        if (isAksesDitutup) return;

        btnMulai.innerText = "Mengecek status...";
        btnMulai.disabled = true;

        try {
          const q = query(
            collection(db, "hasil_ujian"),
            where("nama", "==", n),
            where("asal_sekolah", "==", s),
          );
          const snap = await getDocs(q);

          if (!snap.empty) {
            const data = snap.docs[0].data();
            const statusSeleksi = data.status_seleksi || "PENDING";

            if (statusSeleksi !== "PENDING") {
              // ADMIN SUDAH KLIK TERIMA/TOLAK
              btnMulai.innerText = "Cek Hasil Seleksi";
              btnMulai.className =
                "w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95";
            } else {
              // SUDAH UJIAN TAPI BELUM DITINJAU
              btnMulai.innerText = "Lihat Status Ujian";
              btnMulai.className =
                "w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-xl transition-all shadow-lg active:scale-95";
            }
            btnMulai.disabled = false;
          } else {
            // BELUM UJIAN: Kembalikan ke teks asli dari server
            btnMulai.innerText = defaultBtnText;
            btnMulai.className = defaultBtnClass;
            if (defaultBtnText === "Mulai Ujian Sekarang") {
              btnMulai.disabled = false;
            } else {
              btnMulai.disabled = true;
            }
          }
        } catch (e) {
          console.error(e);
          btnMulai.innerText = defaultBtnText;
          btnMulai.className = defaultBtnClass;
        }
      };

      // EVENT: Saat Tombol Diklik
      btnMulai.onclick = async () => {
        const n = selNama.value;
        const s = selSekolah.value;

        if (!n || !s) {
          return Swal.fire({
            icon: "warning",
            title: "Data Belum Lengkap",
            text: "Silakan pilih Asal Sekolah dan Nama Siswa terlebih dahulu untuk melanjutkan.",
            confirmButtonColor: "#3b82f6", // Warna Biru Asterix
            confirmButtonText: "Sip, Saya Pilih Dulu",
          });
        }

        // Simpan teks tombol saat ini (bisa "Mulai Ujian", "Cek Hasil", atau "Lihat Status")
        const currentBtnText = btnMulai.innerText;

        btnMulai.disabled = true;
        btnMulai.innerText = "Memvalidasi...";

        Swal.fire({
          title: "Memvalidasi Peserta",
          text: "Harap tunggu, sistem sedang mengecek status Anda.",
          allowOutsideClick: false,
          didOpen: () => {
            Swal.showLoading();
          },
        });

        try {
          const snapSet = await getDoc(doc(db, "pengaturan", "config_utama"));
          const config = snapSet.data();
          const sekarang = new Date().getTime();
          const waktuMulai = new Date(config.waktu_mulai).getTime();

          // 1. Validasi Akses Tutup
          if (config && config.is_active === false) {
            Swal.close();
            await Swal.fire({
              icon: "error",
              title: "Akses Ditutup",
              text: "Mohon maaf, admin telah menutup akses ujian ini secara manual.",
              confirmButtonColor: "#ef4444",
            });
            location.reload();
            return;
          }

          // 2. Validasi Jadwal (Cegah Curi Start)
          // Kecuali jika tombolnya sudah berubah jadi "Cek Hasil" (berarti dia sudah ujian)
          if (
            sekarang < waktuMulai &&
            currentBtnText === "Ujian Belum Dimulai"
          ) {
            Swal.close();
            const tglTampil = config.waktu_mulai.replace("T", " ");
            await Swal.fire({
              icon: "warning",
              title: "Belum Waktunya",
              html: `Sabar ya gaess, ujian belum dimulai!<br><br>Jadwal dibuka pada:<br><b>${tglTampil}</b>`,
              confirmButtonColor: "#3b82f6",
            });
            btnMulai.disabled = false;
            btnMulai.innerText = currentBtnText;
            return;
          }

          const q = query(
            collection(db, "hasil_ujian"),
            where("nama", "==", n),
            where("asal_sekolah", "==", s),
          );
          const snap = await getDocs(q);
          Swal.close();

          if (!snap.empty) {
            const dataLama = snap.docs[0].data();
            const statusSeleksi = dataLama.status_seleksi || "PENDING";

            if (dataLama.status === "DISKUALIFIKASI (CURANG)") {
              await Swal.fire({
                icon: "error",
                title: "Akses Ditolak",
                text: "Anda telah didiskualifikasi karena kecurangan.",
              });
            } else if (statusSeleksi === "DITERIMA") {
              await Swal.fire({
                icon: "success",
                title: "Selamat Datang di Tim!",
                html: `<div class="text-left text-sm leading-relaxed">

              Wah, selamat ya <b>${n}</b>!<br><br>

              Berdasarkan hasil ujianmu, kamu dinyatakan <b class="text-green-600 text-lg">DITERIMA</b> untuk melaksanakan PKL/Prakerin di <b>PT. Asterix Inovasi Teknologi</b>.

              <br><br>

              Kami senang bisa membantumu belajar lebih dalam di dunia industri. Segera laporkan hasil ini ke <b>Guru Pembimbing</b> di sekolahmu dan hubungi Admin kami untuk menentukan jadwal mulai masuk.

              <br><br>

              Sampai bertemu di kantor gaess!

            </div>`,
                confirmButtonColor: "#10b981",
                confirmButtonText: "Siap, Admin!",
              });
            } else if (statusSeleksi === "DITOLAK") {
              await Swal.fire({
                icon: "info",
                title: "Hasil Seleksi",
                html: `<div class="text-left text-sm leading-relaxed">

              Halo <b>${n}</b>,<br><br>

              Terima kasih sudah mengikuti ujian seleksi dan berminat untuk melaksanakan PKL di <b>PT. Asterix Inovasi Teknologi</b>.

              <br><br>

              Kami telah meninjau hasil ujianmu, namun mohon maaf untuk saat ini kuota peserta PKL kami sudah penuh atau hasil ujianmu <b class="text-red-600">BELUM MEMENUHI KRITERIA</b> tim teknis kami.

              <br><br>

              Jangan berkecil hati ya! Teruslah belajar, asah lagi kemampuan di sekolah, dan tetap semangat. Semoga sukses di tempat PKL lainnya!

            </div>`,
                confirmButtonColor: "#ef4444",
                confirmButtonText: "Tetap Semangat!",
              });
            } else {
              await Swal.fire({
                icon: "info",
                title: "Sudah Selesai",
                text: "Anda sudah menyelesaikan ujian. Tunggu informasi selanjutnya dari Admin.",
              });
            }
            btnMulai.disabled = false;
            btnMulai.innerText = currentBtnText;
            return;
          }

          // JIKA LOLOS SEMUA: MASUK KE UJIAN
          localStorage.setItem("user_nama", n);
          localStorage.setItem("user_sekolah", s);
          window.location.href = "ujian.html";
        } catch (error) {
          console.error(error);
          Swal.fire("Error", "Gagal memvalidasi data.", "error");
          btnMulai.disabled = false;
          btnMulai.innerText = currentBtnText;
        }
      };

      // Fungsi Panduan
      window.showPanduan = () => {
        Swal.fire({
          title:
            '<span class="text-slate-800 tracking-tight">PANDUAN UJIAN CBT</span>',
          html: `
        <div class="text-left text-slate-600 text-sm leading-relaxed space-y-3 p-2">
            <div class="flex gap-3">
                <span class="flex-none w-5 h-5 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-[10px] font-bold">1</span>
                <p>Pastikan sudah membaca kisi-kisi dari admin.</p>
            </div>
            <div class="flex gap-3">
                <span class="flex-none w-5 h-5 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center text-[10px] font-bold">2</span>
                <p>Pilih Sekolah dan Nama yang sudah terdaftar di PT. Asterix Inovasi Teknologi.</p>
            </div>
            <div class="flex gap-3">
                <span class="flex-none w-5 h-5 bg-red-100 text-red-600 rounded-full flex items-center justify-center text-[10px] font-bold">3</span>
                <p><b>Dilarang Curang!</b> Ada sistem deteksi otomatis.</p>
            </div>
            <div class="flex gap-3">
                <span class="flex-none w-5 h-5 bg-green-100 text-green-600 rounded-full flex items-center justify-center text-[10px] font-bold">4</span>
                <p>Hasil diterima/tidaknya bisa dicek langsung di halaman ini setelah ujian selesai.</p>
            </div>
            <p class="text-center font-bold text-blue-600 pt-4 italic">"Selamat mengerjakan gaess!"</p>
        </div>
      `,
          confirmButtonText: "SAYA MENGERTI",
          confirmButtonColor: "#3b82f6",
          borderRadius: "2rem",
        });
      };

      initLogin();
    </script>
  </body>
</html>
